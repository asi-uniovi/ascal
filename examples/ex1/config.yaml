# Simple configuration file with 1 application and ideal transition

# All available autoscalers
autoscalers:
  h_reactive: # Horizontal+reactive autoscaling
    time_period: 60 # Time period to evaluate autoscaling
    desired_cpu_utilization: 0.7  # Desired CPU utilization
    node_utilization_threshold: 0.5 # Below this utilization, node removal is tried
  hv_reactive: # Horizontal/vertical+reactive autoscaling
    time_period: 60 # Time period to evaluate autoscaling
    desired_cpu_utilization: 0.7  # Desired CPU utilization
    algorithm: fcma
    transition_time_budget: 100 # Approximate time budget for the transition (0 for simple transaction)
  hv_predictive: # Horizontal/vertical+predictive autoscaling
    prediction_window: 600 # Prediction window in seconds
    prediction_percentile: 95
    algorithm: fcma
    transition_time_budget: 200 # Approximate time budget for the transition (0 for simple transaction)

# Select autoscaler
autoscaler: hv_predictive

# Times in seconds
node_time_to_billing: 20 # Time from the request of creating a node, until it starts to be billed.
node_creation_time: 100 # Total time from the request of creating a node until the node is ready
                      # to execute containers. A node is billed (node_creation_time - node_time_to_running)
                      # seconds being ready to allocate any container.
node_removal_time: 10  # Time from the request of node removal until it is removed. Meanwhile, it is billed.
container_creation_time: 1 # Time from the request of container creation until it can process load.
container_removal_time: 5 # Time from the request of container removal until it is removed from the node.
                          # Meanwhile. it can not process new load, but consumes computational resources.

# Define applications
apps:
  app0:
    load:
      file: ../trace-triangle.csv # Integer load samples in req/s
      time_interval: 1 # Integer time in seconds between two consecutive samples
      repeat: 1 # The whole set of samples in the file is repeated this number of times
      load_offset: 10 # Integer value to be added to every load sample
      load_mult: 4 # Multiplier for the load samples (multiplies also the load offset)
      time_offset: 0 # Advance this number of samples and complete with the last value
    container:
      cpu: 260 mcores
      mem: 0.420 GiB
      perf: 1 req/s
      aggs: [1, 2]
  app1:
    load:
      file: ../trace-triangle.csv # Integer load samples in req/s
      time_interval: 1 # Integer time in seconds between two consecutive samples
      repeat: 1 # The whole set of samples in the file is repeated this number of times
      load_offset: 50 # Integer value to be added to every load sample
      load_mult: 3 # Multiplier for the load samples (multiplies also the load offset)
      time_offset: 100 # Advance this number of samples and complete with the last value
    container:
      cpu: 300 mcores
      mem: 0.500 GiB
      perf: 1 req/s
      aggs: [1, 2]

# Simulation time in seconds.
# If application traces are short, the last load in the trace is repeated.
# If application traces are too long, they are truncated at the end.
simulation_time: 3600


